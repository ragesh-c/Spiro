  <script>
    // ── Cal sheet ─────────────────────────────────────────────────
    (function () {
      var sheet = document.getElementById('cal-sheet');
      if (!sheet) return;
      var calLoaded = false;

      function openSheet() {
        sheet.classList.add('open');
        document.body.style.overflow = 'hidden';
        var bd = sheet.querySelector('.cal-sheet__backdrop');
        var pn = sheet.querySelector('.cal-sheet__panel');
        anime.animate(bd, { opacity: 1, duration: 420, ease: 'easeOutQuart' });
        anime.animate(pn, { translateX: ['100%', '0%'], duration: 650, ease: 'cubic-bezier(0.22, 1, 0.36, 1)' });
        if (!calLoaded) {
          calLoaded = true;
          (function (C, A, L) {
            var p = function (a, ar) { a.q.push(ar); };
            var d = C.document;
            C.Cal = C.Cal || function () {
              var cal = C.Cal; var ar = arguments;
              if (!cal.loaded) {
                cal.ns = {}; cal.q = cal.q || [];
                d.head.appendChild(d.createElement('script')).src = A;
                cal.loaded = true;
              }
              if (ar[0] === L) {
                var api = function () { p(api, arguments); };
                var namespace = ar[1]; api.q = api.q || [];
                if (typeof namespace === 'string') {
                  cal.ns[namespace] = cal.ns[namespace] || api;
                  p(cal.ns[namespace], ar); p(cal, ['initNamespace', namespace]);
                } else p(cal, ar); return;
              }
              p(cal, ar);
            };
          })(window, 'https://app.cal.com/embed/embed.js', 'init');
          Cal('init', 'intro-call-spiro-creatives', { origin: 'https://app.cal.com' });
          Cal.ns['intro-call-spiro-creatives']('inline', {
            elementOrSelector: '#my-cal-inline-intro-call-spiro-creatives',
            config: { layout: 'month_view', useSlotsViewOnSmallScreen: 'true' },
            calLink: 'spiro-c-2mxfjy/intro-call-spiro-creatives',
          });
          Cal.ns['intro-call-spiro-creatives']('ui', {
            hideEventTypeDetails: false, layout: 'month_view', theme: 'dark',
            cssVarsPerTheme: { dark: {'cal-brand':'#f5ac45'}, light: {'cal-brand':'#f5ac45'} },
          });
        }
      }

      function closeSheet() {
        var bd = sheet.querySelector('.cal-sheet__backdrop');
        var pn = sheet.querySelector('.cal-sheet__panel');
        anime.animate(bd, { opacity: 0, duration: 360, ease: 'easeInQuart' });
        anime.animate(pn, {
          translateX: '100%',
          duration: 440,
          ease: 'cubic-bezier(0.76, 0, 0.24, 1)',
          onComplete: function () {
            sheet.classList.remove('open');
            document.body.style.overflow = '';
          }
        });
      }

      document.querySelectorAll('[data-cal-sheet]').forEach(function (el) {
        el.addEventListener('click', function (e) {
          e.preventDefault(); e.stopPropagation(); openSheet();
        });
      });
      sheet.querySelector('.cal-sheet__backdrop').addEventListener('click', closeSheet);
      sheet.querySelector('.cal-sheet__close').addEventListener('click', closeSheet);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && sheet.classList.contains('open')) closeSheet();
      });
    }());
  </script>

  <div id="page-transition"></div>

  <script>
    // ── Page transitions ─────────────────────────────────────────
    (function () {
      var overlay = document.getElementById('page-transition');
      if (!overlay) return;
      // Reveal is handled by CSS animation — no JS needed on load
      document.addEventListener('click', function (e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.charAt(0) === '#' || href.indexOf('mailto') === 0 ||
            href.indexOf('tel') === 0 || link.target) return;
        e.preventDefault();
        overlay.style.animation = 'none';
        overlay.style.opacity = '0';
        overlay.offsetHeight; // force reflow
        overlay.style.transition = 'opacity 0.4s cubic-bezier(0.65, 0, 0.35, 1)';
        overlay.style.pointerEvents = 'all';
        requestAnimationFrame(function () {
          overlay.style.opacity = '1';
          setTimeout(function () { window.location.href = href; }, 420);
        });
      });
    }());
  </script>
